<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Outer ring — roulette wheel with segments -->
  <circle cx="256" cy="256" r="240" stroke="#f45d2e" stroke-width="28" opacity="0.15"/>

  <!-- Spinning segments around the wheel -->
  <g stroke="#f45d2e" stroke-width="28" stroke-linecap="round" opacity="0.9">
    <!-- Top-right arc -->
    <path d="M 256 16 A 240 240 0 0 1 469 137" fill="none"/>
    <!-- Bottom-left arc -->
    <path d="M 256 496 A 240 240 0 0 1 43 375" fill="none"/>
  </g>
  <g stroke="#f45d2e" stroke-width="28" stroke-linecap="round" opacity="0.45">
    <!-- Right-bottom arc -->
    <path d="M 496 256 A 240 240 0 0 1 375 469" fill="none"/>
    <!-- Left-top arc -->
    <path d="M 16 256 A 240 240 0 0 1 137 43" fill="none"/>
  </g>

  <!-- Code brackets < > in center -->
  <g stroke="#f45d2e" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left bracket < -->
    <polyline points="220,180 148,256 220,332"/>
    <!-- Right bracket > -->
    <polyline points="292,180 364,256 292,332"/>
  </g>

  <!-- Slash / in center -->
  <line x1="280" y1="170" x2="232" y2="342" stroke="#f45d2e" stroke-width="28" stroke-linecap="round" opacity="0.5"/>
</svg>
